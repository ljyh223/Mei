name: Fast Out-Of-The-Box Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 支持在 GitHub 页面上手动点击触发运行

jobs:
  quick-build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 配置兼容你仓库的 Java 21 环境
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. 启用官方最新 Gradle 缓存和依赖托管，大幅度缩短后续构建时间
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. 授予 Linux 环境下 Gradle 脚本执行权限
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 5. 快速构建：自动使用 Android 临时调试签名（免配置 Secrets）
      - name: Build Debug APK with Temp Signature
        run: ./gradlew assembleDebug

      # 6. 将生成的 APK 收集并上传为 GitHub 页面产物（Artifacts）
      - name: Upload Output APK
        uses: actions/upload-artifact@v4
        with:
          name: Mei-FastBuild-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7 # 产物在 GitHub 上保留 7 天，过期自动清理
